  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <title>TempoTuner — Tap Tempo Trainer & Rhythm Checker | Free Online BPM Practice Tool</title>

      name="description"
      content="Free tap tempo trainer: tap the beat while you sing or play and see where you drift. Daily song tempo challenge, BPM graph, metronome — no install, no account."
    />

    <link rel="canonical" href="https://tempotuner.app/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="TempoTuner" />
    <meta property="og:title" content="TempoTuner — Tap Tempo Trainer & Rhythm Checker" />
    <meta
      property="og:description"
      content="Tap the beat while you sing or play and see exactly where your tempo drifted. Plus a daily challenge: tap a hit song's tempo from memory and build a streak."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tempotuner.app/" />
    <meta property="og:image" content="https://tempotuner.app/og-image.png" />
    <meta property="og:site_name" content="TempoTuner" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TempoTuner — Tap Tempo Trainer & Rhythm Checker" />
    <meta
      name="twitter:description"
      content="Tap the beat while you sing and see exactly where you rushed or slowed down. Daily song tempo challenge with streaks. Free, works in any browser."
    />
    <meta name="twitter:image" content="https://tempotuner.app/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebApplication",
            "name": "TempoTuner",
            "url": "https://tempotuner.app/",
            "description": "Free online tap tempo trainer and rhythm consistency checker. Tap the beat while singing or playing, see your BPM on a live graph, practice with a metronome, and record yourself to hear where your timing drifted.",
            "applicationCategory": "MusicApplication",
            "operatingSystem": "Any",
            "browserRequirements": "Requires JavaScript",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "featureList": [
              "Daily tempo challenge with streaks",
              "Tap tempo BPM detection",
              "Tempo consistency graph",
              "Target BPM with metronome",
              "Voice recording with synced playback",
              "Shareable daily result image with tempo graph",
              "Works offline as a PWA"
            ]
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "How do I check if I am singing in tempo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Open TempoTuner, start singing, and tap anywhere on the screen to the beat. The app measures your BPM on every tap and draws a graph showing exactly where you rushed or slowed down."
                }
              },
              {
                "@type": "Question",
                "name": "How do I practice keeping a steady tempo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Set a target BPM and practice with the metronome clicking, or turn it off after a few beats and keep the tempo on your own — the graph shows exactly how steady you stayed."
                }
              },
              {
                "@type": "Question",
                "name": "What is the TempoTuner daily challenge?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Every day TempoTuner names one well-known song. You sing it in your head, tap its beat from memory, and get scored on how close your tempo was to the song's real BPM. Play daily to build a streak and train your tempo awareness."
                }
              },
              {
                "@type": "Question",
                "name": "Is TempoTuner free and private?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. TempoTuner is free, runs entirely in your browser, and needs no account. Taps and voice recordings never leave your device. Anonymous visit statistics are collected only if you accept analytics cookies."
                }
              }
            ]
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>TempoTuner — tap tempo trainer and rhythm checker</h1>
      <p>
        TempoTuner is a free online rhythm practice tool for singers and musicians. Tap the beat
        while you sing or play, see your tempo in BPM on a live graph, practice with a metronome,
        and record yourself to hear exactly where your timing drifted. Every day there is a new
        challenge: tap a well-known song's tempo from memory and keep your streak going. Please
        enable JavaScript to use the app.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
